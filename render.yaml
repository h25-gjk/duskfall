services:
  - type: web
    name: duskfall
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PGSSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: duskfall-db
          property: connectionString

databases:
  - name: duskfall-db
    databaseName: duskfall
    plan: free
