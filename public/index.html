<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>暮色求生 · Duskfall</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="stats-panel">
      <div class="stat-row">
        <span class="stat-icon">❤️</span>
        <div class="stat-bar"><div class="stat-fill" id="hp-fill" style="width:100%;background:#c44"></div></div>
        <span class="stat-val" id="hp-val">100</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">🍖</span>
        <div class="stat-bar"><div class="stat-fill" id="hunger-fill" style="width:100%;background:#c84"></div></div>
        <span class="stat-val" id="hunger-val">100</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">🔮</span>
        <div class="stat-bar"><div class="stat-fill" id="sanity-fill" style="width:100%;background:#84c"></div></div>
        <span class="stat-val" id="sanity-val">100</span>
      </div>
    </div>
    <div id="day-panel">
      <div id="day-num">第 1 天</div>
      <div id="time-label">白天</div>
    </div>
  </div>

  <!-- 背包+提示 -->
  <div id="bottom-bar">
    <div id="inventory">
      <div class="inv-slot" id="inv-wood"><span class="inv-icon">🪵</span><span class="inv-count"></span></div>
      <div class="inv-slot" id="inv-stone"><span class="inv-icon">🪨</span><span class="inv-count"></span></div>
      <div class="inv-slot" id="inv-berry"><span class="inv-icon">🍓</span><span class="inv-count"></span></div>
      <div class="inv-slot" id="inv-torch"><span class="inv-icon">🔦</span><span class="inv-count"></span></div>
    </div>
    <div id="hint-text">
      <b>WASD</b> 移动 · <b>E</b> 采集 · <b>C</b> 合成<br>
      <b>空格</b> 攻击 · 天黑前准备好火源
    </div>
  </div>

  <!-- 合成菜单 -->
  <div id="craft-menu">
    <div id="craft-title">合 成</div>
    <div id="craft-list"></div>
  </div>

  <!-- 排行榜 -->
  <div id="leaderboard-panel">
    <button id="lb-close">×</button>
    <h3>排 行 榜</h3>
    <div id="lb-list"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- 认证面板 -->
  <div id="auth-panel">
    <span id="auth-status">未登录</span>
    <div id="auth-form">
      <input class="auth-input" id="auth-user" placeholder="用户名" maxlength="20">
      <input class="auth-input" id="auth-pass" type="password" placeholder="密码" maxlength="20">
      <button class="auth-btn" id="auth-login-btn">登录</button>
      <button class="auth-btn" id="auth-register-btn">注册</button>
    </div>
    <button class="auth-btn" id="auth-logout-btn" style="display:none">退出</button>
    <button class="auth-btn" id="lb-toggle-btn">排行</button>
  </div>

  <!-- 开始/死亡屏幕 -->
  <div id="overlay">
    <div id="ov-title">暮色求生</div>
    <div id="ov-sub">DUSKFALL · 在黑夜降临前活下去</div>

    <!-- 角色选择 -->
    <div id="char-select"></div>

    <!-- 联机选项 -->
    <div id="mp-check-wrap">
      <label><input type="checkbox" id="mp-check"> 联机模式</label>
    </div>

    <div id="ov-stats" style="display:none">
      <div class="ov-stat"><div class="ov-stat-val" id="ov-days">0</div><div class="ov-stat-label">存活天数</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="ov-kills">0</div><div class="ov-stat-label">击杀暗影</div></div>
    </div>
    <button id="ov-btn">开始游戏</button>
    <div class="controls-hint">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp; <kbd>E</kbd> 采集 &nbsp; <kbd>C</kbd> 合成 &nbsp; <kbd>空格</kbd> 攻击<br>
      白天采集资源，天黑前合成篝火或回到家中。黑夜中远离火光会持续掉理智和血量。<br>
      暗影会在夜晚出现——用火光或武器击退它们。
    </div>
  </div>
</div>

<!-- Socket.io 客户端 (由服务器提供) -->
<script src="/socket.io/socket.io.js"></script>

<!-- 入口模块 -->
<script type="module" src="/js/main.js"></script>
</body>
</html>
