<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>暮色求生 · Duskfall</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#060814;
    font-family: -apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; color:#E8D5B0; }
  #game { position:relative; width:100vw; height:100vh; }
  canvas { display:block; width:100%; height:100%; cursor:crosshair; image-rendering:pixelated; }

  /* ── HUD ── */
  #hud { position:absolute; top:0; left:0; right:0; padding:12px 16px;
    display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; z-index:10; }
  #stats-panel { display:flex; flex-direction:column; gap:6px; }
  .stat-row { display:flex; align-items:center; gap:8px; }
  .stat-icon { width:22px; text-align:center; font-size:14px; }
  .stat-bar { width:140px; height:14px; border-radius:7px; background:rgba(255,255,255,.08);
    border:1px solid rgba(232,213,176,.15); overflow:hidden; position:relative; }
  .stat-fill { height:100%; border-radius:6px; transition:width .3s ease, background .3s; }
  .stat-val { font-size:11px; color:#8a8d9f; min-width:38px; font-variant-numeric:tabular-nums; }
  #day-panel { text-align:right; }
  #day-num { font-size:24px; font-weight:700; color:#E8D5B0; }
  #time-label { font-size:11px; color:#8a8d9f; letter-spacing:1px; text-transform:uppercase; }

  /* ── 底部背包+提示 ── */
  #bottom-bar { position:absolute; bottom:0; left:0; right:0; padding:10px 16px;
    display:flex; justify-content:space-between; align-items:flex-end; pointer-events:none; z-index:10; }
  #inventory { display:flex; gap:6px; }
  .inv-slot { width:42px; height:42px; border-radius:8px; background:rgba(255,255,255,.05);
    border:1px solid rgba(232,213,176,.12); display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:10px; color:#6b6f8a; position:relative; }
  .inv-slot.has { border-color:rgba(232,213,176,.3); color:#E8D5B0; }
  .inv-icon { font-size:18px; line-height:1; }
  .inv-count { position:absolute; bottom:2px; right:4px; font-size:10px; font-weight:700; color:#E8D5B0; }
  #hint-text { font-size:11px; color:#4a4d63; text-align:right; max-width:200px; line-height:1.5; }
  #hint-text b { color:#8a8d9f; }

  /* ── 合成菜单 ── */
  #craft-menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(10,12,24,.95); border:1px solid rgba(232,213,176,.2); border-radius:12px;
    padding:20px 24px; z-index:20; min-width:320px; display:none; backdrop-filter:blur(8px); }
  #craft-menu.show { display:block; }
  #craft-title { font-size:16px; font-weight:700; margin-bottom:14px; text-align:center; letter-spacing:2px; }
  .craft-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px;
    border-radius:8px; margin-bottom:6px; cursor:pointer; transition:background .15s; }
  .craft-item:hover { background:rgba(232,213,176,.06); }
  .craft-item.disabled { opacity:.35; cursor:not-allowed; }
  .craft-info { display:flex; align-items:center; gap:10px; }
  .craft-icon { font-size:22px; }
  .craft-name { font-size:13px; }
  .craft-cost { font-size:11px; color:#6b6f8a; }
  .craft-btn { font-size:11px; color:#E8D5B0; border:1px solid rgba(232,213,176,.3);
    padding:4px 10px; border-radius:4px; }

  /* ── 死亡/开始屏幕 ── */
  #overlay { position:absolute; inset:0; background:rgba(6,8,20,.92); z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  #overlay.hide { display:none; }
  #ov-title { font-size:42px; font-weight:800; letter-spacing:4px; margin-bottom:8px; }
  #ov-sub { font-size:13px; color:#6b6f8a; margin-bottom:30px; letter-spacing:1px; }
  #ov-stats { display:flex; gap:30px; margin-bottom:30px; }
  .ov-stat { text-align:center; }
  .ov-stat-val { font-size:28px; font-weight:700; color:#E8D5B0; }
  .ov-stat-label { font-size:10px; color:#4a4d63; text-transform:uppercase; letter-spacing:1px; }
  #ov-btn { padding:14px 40px; border:1px solid rgba(232,213,176,.3); border-radius:8px;
    background:rgba(232,213,176,.06); color:#E8D5B0; font-size:15px; cursor:pointer; letter-spacing:2px;
    transition:all .2s; }
  #ov-btn:hover { background:rgba(232,213,176,.12); }
  .controls-hint { margin-top:24px; font-size:11px; color:#4a4d63; line-height:1.8; }
  .controls-hint kbd { background:rgba(255,255,255,.06); padding:1px 6px; border-radius:3px;
    border:1px solid rgba(255,255,255,.1); font-family:monospace; color:#8a8d9f; }

  /* ── 浮动提示文字 ── */
  #toast { position:absolute; top:60px; left:50%; transform:translateX(-50%);
    background:rgba(10,12,24,.85); border:1px solid rgba(232,213,176,.15); padding:8px 16px;
    border-radius:6px; font-size:12px; opacity:0; transition:opacity .3s; z-index:15; pointer-events:none;
    white-space:nowrap; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="stats-panel">
      <div class="stat-row">
        <span class="stat-icon">❤️</span>
        <div class="stat-bar"><div class="stat-fill" id="hp-fill" style="width:100%;background:#c44"></div></div>
        <span class="stat-val" id="hp-val">100</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">🍖</span>
        <div class="stat-bar"><div class="stat-fill" id="hunger-fill" style="width:100%;background:#c84"></div></div>
        <span class="stat-val" id="hunger-val">100</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">🔮</span>
        <div class="stat-bar"><div class="stat-fill" id="sanity-fill" style="width:100%;background:#84c"></div></div>
        <span class="stat-val" id="sanity-val">100</span>
      </div>
    </div>
    <div id="day-panel">
      <div id="day-num">第 1 天</div>
      <div id="time-label">白天</div>
    </div>
  </div>

  <!-- 背包+提示 -->
  <div id="bottom-bar">
    <div id="inventory">
      <div class="inv-slot" id="inv-wood"><span class="inv-icon">🪵</span><span class="inv-count"></span></div>
      <div class="inv-slot" id="inv-stone"><span class="inv-icon">🪨</span><span class="inv-count"></span></div>
      <div class="inv-slot" id="inv-berry"><span class="inv-icon">🍓</span><span class="inv-count"></span></div>
      <div class="inv-slot" id="inv-torch"><span class="inv-icon">🔦</span><span class="inv-count"></span></div>
    </div>
    <div id="hint-text">
      <b>WASD</b> 移动 · <b>E</b> 采集 · <b>C</b> 合成<br>
      <b>点击</b> 放置篝火 · 天黑前准备好火源
    </div>
  </div>

  <!-- 合成菜单 -->
  <div id="craft-menu">
    <div id="craft-title">合 成</div>
    <div id="craft-list"></div>
  </div>

  <!-- 浮动提示 -->
  <div id="toast"></div>

  <!-- 开始/死亡屏幕 -->
  <div id="overlay">
    <div id="ov-title">暮色求生</div>
    <div id="ov-sub">DUSKFALL · 在黑夜降临前活下去</div>
    <div id="ov-stats" style="display:none">
      <div class="ov-stat"><div class="ov-stat-val" id="ov-days">0</div><div class="ov-stat-label">存活天数</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="ov-kills">0</div><div class="ov-stat-label">击杀暗影</div></div>
    </div>
    <button id="ov-btn">开始游戏</button>
    <div class="controls-hint">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp; <kbd>E</kbd> 采集 &nbsp; <kbd>C</kbd> 合成 &nbsp; <kbd>空格</kbd> 攻击<br>
      白天采集资源，天黑前合成篝火。黑夜中远离火光会持续掉理智和血量。<br>
      暗影会在夜晚出现——用火光或武器击退它们。
    </div>
  </div>
</div>

<script>
"use strict";
(() => {

// ═══════════════════════════════════════════════════════════
//  常量 & 配置
// ═══════════════════════════════════════════════════════════
const TILE = 32;
const MAP_W = 64, MAP_H = 64;
const DAY_LEN = 45, DUSK_LEN = 8, NIGHT_LEN = 22; // 秒
const DAY_TOTAL = DAY_LEN + DUSK_LEN + NIGHT_LEN;

const T_GRASS=0, T_TREE=1, T_ROCK=2, T_BUSH=3, T_WATER=4, T_STUMP=5, T_DEADROCK=6;

const CRAFT_RECIPES = [
  { id:'campfire', name:'篝火', icon:'🔥', wood:2, stone:2, desc:'提供光源, 赶走暗影' },
  { id:'axe',      name:'斧头', icon:'🪓', wood:1, stone:1, desc:'采集树木更快' },
  { id:'torch',    name:'火把', icon:'🔦', wood:1, stone:0, desc:'随身光源(60秒)' },
  { id:'spear',    name:'长矛', icon:'⚔️', wood:2, stone:1, desc:'攻击力+200%' },
];

// ═══════════════════════════════════════════════════════════
//  全局状态
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let DPR = 1, VW = 0, VH = 0;

let map = [];           // [y][x] = tile type
let resData = [];       // 资源节点附加数据 (血量等)
let entities = [];      // 篝火、暗影等动态实体
let particles = [];     // 粒子效果
let player = null;
let cam = { x:0, y:0 };
let dayCount = 1;
let timeOfDay = 0;      // 0~DAY_TOTAL 秒
let phase = 'day';      // day / dusk / night
let kills = 0;
let gameRunning = false;
let keys = {};
let mouse = { x:0, y:0, down:false };
let craftOpen = false;
let placeMode = null;   // 'campfire' 等, 非null时点击地图放置
let torchTimer = 0;     // 火把剩余时间
let attackCD = 0;
let gatherCD = 0;
let damageFlash = 0;

// 音频
let audioCtx = null;
function initAudio() {
  if (!audioCtx) try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  if (audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function sfx(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  switch(type) {
    case 'chop':
      o.type='square'; o.frequency.setValueAtTime(120,t);
      o.frequency.exponentialRampToValueAtTime(60,t+0.1);
      g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.12);
      o.start(t); o.stop(t+.13); break;
    case 'mine':
      o.type='square'; o.frequency.setValueAtTime(200,t);
      o.frequency.exponentialRampToValueAtTime(80,t+0.08);
      g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
      o.start(t); o.stop(t+.11); break;
    case 'pickup':
      o.type='sine'; o.frequency.setValueAtTime(440,t);
      o.frequency.exponentialRampToValueAtTime(660,t+0.08);
      g.gain.setValueAtTime(.08,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
      o.start(t); o.stop(t+.11); break;
    case 'hit':
      o.type='sawtooth'; o.frequency.setValueAtTime(150,t);
      o.frequency.exponentialRampToValueAtTime(50,t+0.15);
      g.gain.setValueAtTime(.15,t); g.gain.exponentialRampToValueAtTime(.001,t+.16);
      o.start(t); o.stop(t+.17); break;
    case 'craft':
      o.type='triangle'; o.frequency.setValueAtTime(330,t);
      o.frequency.exponentialRampToValueAtTime(550,t+0.15);
      g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.18);
      o.start(t); o.stop(t+.2); break;
    case 'howl':
      o.type='sawtooth'; o.frequency.setValueAtTime(80,t);
      o.frequency.linearRampToValueAtTime(120,t+0.3);
      o.frequency.linearRampToValueAtTime(60,t+0.6);
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.06,t+0.1);
      g.gain.linearRampToValueAtTime(0,t+0.6);
      o.start(t); o.stop(t+0.65); break;
  }
}

// ═══════════════════════════════════════════════════════════
//  地图生成
// ═══════════════════════════════════════════════════════════
function genMap() {
  map = []; resData = [];
  for (let y=0; y<MAP_H; y++) {
    map[y] = []; resData[y] = [];
    for (let x=0; x<MAP_W; x++) {
      map[y][x] = T_GRASS;
      resData[y][x] = null;
    }
  }
  // 用简单噪声散布资源
  for (let y=0; y<MAP_H; y++) {
    for (let x=0; x<MAP_W; x++) {
      // 中心安全区 (玩家出生点附近) 不放资源
      const dx = x - MAP_W/2, dy = y - MAP_H/2;
      const distC = Math.sqrt(dx*dx+dy*dy);
      if (distC < 4) continue;

      const r = Math.random();
      // 森林簇
      if (r < 0.18) {
        map[y][x] = T_TREE;
        resData[y][x] = { hp: 3 };
      } // 岩石簇
      else if (r < 0.24) {
        map[y][x] = T_ROCK;
        resData[y][x] = { hp: 4 };
      } // 浆果丛
      else if (r < 0.30) {
        map[y][x] = T_BUSH;
        resData[y][x] = { hp: 2, berries: 2+Math.floor(Math.random()*2) };
      } // 水域
      else if (r < 0.32) {
        map[y][x] = T_WATER;
      }
    }
  }
  // 扩展森林和岩石簇 (让资源更聚集)
  for (let i=0; i<80; i++) {
    const x = Math.floor(Math.random()*MAP_W);
    const y = Math.floor(Math.random()*MAP_H);
    if (map[y][x] === T_TREE) {
      for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nx=x+dx, ny=y+dy;
        if (nx>=0&&nx<MAP_W&&ny>=0&&ny<MAP_H && map[ny][nx]===T_GRASS && Math.random()<0.6) {
          map[ny][nx]=T_TREE; resData[ny][nx]={hp:3};
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  初始化新游戏
// ═══════════════════════════════════════════════════════════
function newGame() {
  genMap();
  player = {
    x: MAP_W/2 * TILE + TILE/2,
    y: MAP_H/2 * TILE + TILE/2,
    vx:0, vy:0,
    hp:100, hunger:100, sanity:100,
    inv: { wood:0, stone:0, berry:0, torch:0 },
    hasAxe: false, hasSpear: false,
    facing: 0, // 弧度
    animT: 0,
  };
  cam = { x: player.x, y: player.y };
  entities = [];
  particles = [];
  dayCount = 1;
  timeOfDay = 0;
  phase = 'day';
  kills = 0;
  torchTimer = 0;
  damageFlash = 0;
  gameRunning = true;
  updateHUD();
  hideOverlay();
  toast('第 1 天 · 白天', 2000);
}

// ═══════════════════════════════════════════════════════════
//  输入
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'e' || e.key === 'E') tryGather();
  if (e.key === 'c' || e.key === 'C') toggleCraft();
  if (e.key === ' ' && gameRunning) tryAttack();
  if (e.key === 'Escape') { craftOpen=false; placeMode=null; updateCraftMenu(); }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('pointerdown', e => {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width * canvas.width / DPR;
  mouse.y = (e.clientY - rect.top) / rect.height * canvas.height / DPR;
  mouse.down = true;

  if (placeMode) {
    placeItem(mouse.x, mouse.y);
  }
});
canvas.addEventListener('pointerup', () => { mouse.down = false; });
canvas.addEventListener('pointermove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width * canvas.width / DPR;
  mouse.y = (e.clientY - rect.top) / rect.height * canvas.height / DPR;
});

// ═══════════════════════════════════════════════════════════
//  采集
// ═══════════════════════════════════════════════════════════
function tryGather() {
  if (!gameRunning || craftOpen) return;
  if (gatherCD > 0) return;

  const tx = Math.floor(player.x / TILE);
  const ty = Math.floor(player.y / TILE);
  // 检查周围1格
  for (let dy=-1; dy<=1; dy++) {
    for (let dx=-1; dx<=1; dx++) {
      const nx=tx+dx, ny=ty+dy;
      if (nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
      const t = map[ny][nx];
      const rd = resData[ny][nx];
      if (t === T_TREE && rd) {
        rd.hp -= player.hasAxe ? 2 : 1;
        sfx('chop');
        spawnParticles(nx*TILE+TILE/2, ny*TILE+TILE/2, '#4a6a3a', 4);
        gatherCD = 0.25;
        if (rd.hp <= 0) {
          player.inv.wood += 2 + Math.floor(Math.random()*3);
          map[ny][nx] = T_STUMP; resData[ny][nx] = null;
          sfx('pickup');
          updateHUD();
        }
        return;
      }
      if (t === T_ROCK && rd) {
        rd.hp -= player.hasAxe ? 1 : 1; // 斧头不影响挖矿
        sfx('mine');
        spawnParticles(nx*TILE+TILE/2, ny*TILE+TILE/2, '#888', 4);
        gatherCD = 0.3;
        if (rd.hp <= 0) {
          player.inv.stone += 1 + Math.floor(Math.random()*2);
          map[ny][nx] = T_DEADROCK; resData[ny][nx] = null;
          sfx('pickup');
          updateHUD();
        }
        return;
      }
      if (t === T_BUSH && rd) {
        const got = Math.min(rd.berries, 3);
        player.inv.berry += got;
        rd.berries -= got;
        rd.hp -= 1;
        sfx('pickup');
        spawnParticles(nx*TILE+TILE/2, ny*TILE+TILE/2, '#c44', 3);
        gatherCD = 0.2;
        if (rd.hp <= 0 || rd.berries <= 0) {
          map[ny][nx] = T_GRASS; resData[ny][nx] = null;
        }
        updateHUD();
        return;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  合成
// ═══════════════════════════════════════════════════════════
function toggleCraft() {
  if (!gameRunning) return;
  craftOpen = !craftOpen;
  placeMode = null;
  updateCraftMenu();
}

function updateCraftMenu() {
  const menu = document.getElementById('craft-menu');
  const list = document.getElementById('craft-list');
  menu.classList.toggle('show', craftOpen);
  if (!craftOpen) return;

  list.innerHTML = '';
  for (const r of CRAFT_RECIPES) {
    const can = player.inv.wood >= r.wood && player.inv.stone >= r.stone;
    const div = document.createElement('div');
    div.className = 'craft-item' + (can ? '' : ' disabled');
    div.innerHTML = `
      <div class="craft-info">
        <span class="craft-icon">${r.icon}</span>
        <div><div class="craft-name">${r.name}</div>
        <div class="craft-cost">🪵${r.wood} 🪨${r.stone} · ${r.desc}</div></div>
      </div>
      <span class="craft-btn">${can ? '合成' : '不足'}</span>`;
    if (can) {
      div.addEventListener('click', () => craftItem(r));
    }
    list.appendChild(div);
  }
}

function craftItem(recipe) {
  if (player.inv.wood < recipe.wood || player.inv.stone < recipe.stone) return;
  player.inv.wood -= recipe.wood;
  player.inv.stone -= recipe.stone;
  sfx('craft');

  switch(recipe.id) {
    case 'campfire':
      placeMode = 'campfire';
      toast('点击地面放置篝火', 2000);
      break;
    case 'axe':
      player.hasAxe = true;
      toast('获得斧头! 采树更快', 1500);
      break;
    case 'torch':
      player.inv.torch++;
      toast('获得火把! 按E使用(60秒)', 2000);
      break;
    case 'spear':
      player.hasSpear = true;
      toast('获得长矛! 攻击力大增', 1500);
      break;
  }
  craftOpen = false;
  updateCraftMenu();
  updateHUD();
}

function placeItem(screenX, screenY) {
  // 屏幕坐标→世界坐标
  const wx = screenX + cam.x - canvas.width/DPR/2;
  const wy = screenY + cam.y - canvas.height/DPR/2;
  const tx = Math.floor(wx / TILE);
  const ty = Math.floor(wy / TILE);

  if (placeMode === 'campfire') {
    if (tx<0||tx>=MAP_W||ty<0||ty>=MAP_H) return;
    if (map[ty][tx] !== T_GRASS && map[ty][tx] !== T_STUMP) {
      toast('需要在空地上放置', 1200); return;
    }
    entities.push({
      type:'campfire', x: tx*TILE+TILE/2, y: ty*TILE+TILE/2,
      radius: 90, fuel: 999, // 原型: 无限燃料
      flicker: 0,
    });
    placeMode = null;
    toast('篝火已放置! 天黑时靠近它', 2000);
  }
}

// ═══════════════════════════════════════════════════════════
//  攻击
// ═══════════════════════════════════════════════════════════
function tryAttack() {
  if (attackCD > 0) return;
  attackCD = 0.35;
  const dmg = player.hasSpear ? 60 : 25;
  const range = 48;
  for (const e of entities) {
    if (e.type !== 'shadow') continue;
    const dx = e.x - player.x, dy = e.y - player.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d < range) {
      e.hp -= dmg;
      e.knockback = { x: dx/d*8, y: dy/d*8 };
      sfx('hit');
      spawnParticles(e.x, e.y, '#a4c', 5);
      if (e.hp <= 0) {
        e.dead = true;
        kills++;
        spawnParticles(e.x, e.y, '#644', 8);
      }
    }
  }
  // 攻击挥砍特效
  particles.push({
    x: player.x + Math.cos(player.facing)*30,
    y: player.y + Math.sin(player.facing)*30,
    vx:0, vy:0, life:0.2, maxLife:0.2, color:'#E8D5B0', size:8, type:'slash'
  });
}

// ═══════════════════════════════════════════════════════════
//  粒子
// ═══════════════════════════════════════════════════════════
function spawnParticles(x, y, color, n) {
  for (let i=0; i<n; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*3+1;
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:0.5+Math.random()*0.3, maxLife:0.8, color, size:2+Math.random()*2, type:'puff'
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  更新逻辑
// ═══════════════════════════════════════════════════════════
function update(dt) {
  if (!gameRunning) return;

  // ── 玩家移动 ──
  let mx=0, my=0;
  if (keys['w']||keys['arrowup']) my=-1;
  if (keys['s']||keys['arrowdown']) my=1;
  if (keys['a']||keys['arrowleft']) mx=-1;
  if (keys['d']||keys['arrowright']) mx=1;
  if (mx&&my) { mx*=0.707; my*=0.707; }
  const speed = 120;
  const nx = player.x + mx * speed * dt;
  const ny = player.y + my * speed * dt;
  // 碰撞检测
  if (!isSolid(nx, player.y)) player.x = nx;
  if (!isSolid(player.x, ny)) player.y = ny;
  if (mx||my) {
    player.facing = Math.atan2(my, mx);
    player.animT += dt * 8;
  }

  // ── 摄像机跟随 ──
  cam.x += (player.x - cam.x) * Math.min(1, dt*6);
  cam.y += (player.y - cam.y) * Math.min(1, dt*6);

  // ── 时间推进 ──
  timeOfDay += dt;
  if (timeOfDay >= DAY_TOTAL) {
    timeOfDay -= DAY_TOTAL;
    dayCount++;
    toast(`第 ${dayCount} 天 · 黎明`, 2500);
  }
  const oldPhase = phase;
  if (timeOfDay < DAY_LEN) phase = 'day';
  else if (timeOfDay < DAY_LEN + DUSK_LEN) phase = 'dusk';
  else phase = 'night';
  if (phase === 'night' && oldPhase !== 'night') {
    sfx('howl');
    toast('夜幕降临! 暗影正在逼近...', 3000);
    // 生成暗影
    spawnShadows(2 + dayCount);
  }

  // ── 饥饿 ──
  player.hunger -= dt * 1.2;
  if (player.hunger <= 0) {
    player.hunger = 0;
    player.hp -= dt * 5;
    damageFlash = Math.max(damageFlash, 0.3);
  }
  // 自动吃 berries (饥饿低时)
  if (player.hunger < 30 && player.inv.berry > 0) {
    player.inv.berry--;
    player.hunger = Math.min(100, player.hunger + 25);
    spawnParticles(player.x, player.y, '#c44', 3);
    updateHUD();
  }

  // ── 光源检查 ──
  const inLight = isInLight(player.x, player.y);
  if (phase === 'night' && !inLight) {
    player.sanity -= dt * 8;
    player.hp -= dt * 2;
    damageFlash = Math.max(damageFlash, 0.15);
  } else if (inLight) {
    player.sanity = Math.min(100, player.sanity + dt * 5);
  }

  // ── 火把 ──
  if (torchTimer > 0) {
    torchTimer -= dt;
    if (torchTimer <= 0) toast('火把熄灭了', 1500);
  }

  // ── 暗影更新 ──
  for (const e of entities) {
    if (e.dead) continue;
    if (e.type === 'shadow') {
      const dx = player.x - e.x, dy = player.y - e.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      const inFireLight = isInLight(e.x, e.y);
      // 火光中暗影后退
      if (inFireLight && d < 120) {
        e.x -= (dx/d) * 40 * dt;
        e.y -= (dy/d) * 40 * dt;
        e.burning = 0.5;
      } else if (d > 20) {
        e.x += (dx/d) * e.speed * dt;
        e.y += (dy/d) * e.speed * dt;
        e.burning = Math.max(0, e.burning - dt);
      } else {
        // 攻击玩家
        e.attackCD -= dt;
        if (e.attackCD <= 0) {
          e.attackCD = 1.0;
          player.hp -= 8;
          damageFlash = 0.4;
          sfx('hit');
          spawnParticles(player.x, player.y, '#c44', 4);
        }
      }
      // 击退
      if (e.knockback) {
        e.x += e.knockback.x; e.y += e.knockback.y;
        e.knockback.x *= 0.8; e.knockback.y *= 0.8;
        if (Math.abs(e.knockback.x)<0.5) e.knockback = null;
      }
    }
    if (e.type === 'campfire') {
      e.flicker += dt * 10;
    }
  }
  entities = entities.filter(e => !e.dead);

  // ── 粒子更新 ──
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // ── 冷却 ──
  if (attackCD > 0) attackCD -= dt;
  if (gatherCD > 0) gatherCD -= dt;
  if (damageFlash > 0) damageFlash -= dt * 2;

  // ── 死亡 ──
  if (player.hp <= 0) {
    player.hp = 0;
    gameRunning = false;
    showDeath();
  }

  updateHUD();
}

function isSolid(x, y) {
  const tx = Math.floor(x / TILE), ty = Math.floor(y / TILE);
  if (tx<0||tx>=MAP_W||ty<0||ty>=MAP_H) return true;
  const t = map[ty][tx];
  return t === T_TREE || t === T_ROCK || t === T_WATER;
}

function isInLight(x, y) {
  if (torchTimer > 0) return true; // 火把
  for (const e of entities) {
    if (e.type !== 'campfire') continue;
    const dx = e.x - x, dy = e.y - y;
    const r = e.radius + Math.sin(e.flicker||0) * 5;
    if (dx*dx+dy*dy < r*r) return true;
  }
  return false;
}

function spawnShadows(n) {
  for (let i=0; i<n; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = 250 + Math.random()*100;
    entities.push({
      type:'shadow',
      x: player.x + Math.cos(a)*d,
      y: player.y + Math.sin(a)*d,
      hp: 40 + dayCount * 10,
      speed: 35 + Math.random()*15,
      attackCD: 1.0,
      burning: 0,
      flicker: Math.random()*Math.PI*2,
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  渲染
// ═══════════════════════════════════════════════════════════
function render() {
  const w = canvas.width / DPR, h = canvas.height / DPR;
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  // 摄像机偏移
  ctx.translate(w/2 - cam.x, h/2 - cam.y);

  // ── 可见范围 ──
  const x0 = Math.max(0, Math.floor((cam.x - w/2) / TILE) - 1);
  const x1 = Math.min(MAP_W, Math.ceil((cam.x + w/2) / TILE) + 1);
  const y0 = Math.max(0, Math.floor((cam.y - h/2) / TILE) - 1);
  const y1 = Math.min(MAP_H, Math.ceil((cam.y + h/2) / TILE) + 1);

  // ── 地面 ──
  // map 未初始化时 (开始屏幕) 只画背景色
  if (map.length === 0) {
    ctx.fillStyle = '#060814';
    ctx.fillRect(cam.x - w/2, cam.y - h/2, w, h);
  }
  for (let y=y0; y<y1; y++) {
    if (!map[y]) continue;
    for (let x=x0; x<x1; x++) {
      const t = map[y][x];
      const px = x*TILE, py = y*TILE;
      // 草地底色 (微变化)
      const shade = ((x*7+y*13)%5)*2;
      ctx.fillStyle = `rgb(${28+shade},${32+shade},${24+shade})`;
      ctx.fillRect(px, py, TILE, TILE);
      // 草点纹理
      if (t === T_GRASS || t === T_STUMP || t === T_DEADROCK) {
        ctx.fillStyle = 'rgba(60,68,40,.15)';
        ctx.fillRect(px+4, py+6, 2, 2);
        ctx.fillRect(px+18, py+14, 2, 2);
        ctx.fillRect(px+10, py+22, 2, 2);
      }
      // 树桩/死矿
      if (t === T_STUMP) {
        ctx.fillStyle = '#5a4a2a';
        ctx.beginPath();
        ctx.arc(px+TILE/2, py+TILE/2, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#3a2a1a';
        ctx.beginPath();
        ctx.arc(px+TILE/2, py+TILE/2, 4, 0, Math.PI*2);
        ctx.fill();
      }
      if (t === T_DEADROCK) {
        ctx.fillStyle = '#3a3a40';
        ctx.fillRect(px+6, py+6, TILE-12, TILE-12);
      }
      // 水
      if (t === T_WATER) {
        ctx.fillStyle = '#1a2a4a';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = `rgba(80,120,180,${0.1+0.05*Math.sin(performance.now()/500+x+y)})`;
        ctx.fillRect(px, py, TILE, TILE);
      }
    }
  }

  // ── 资源 ──
  for (let y=y0; y<y1; y++) {
    if (!map[y]) continue;
    for (let x=x0; x<x1; x++) {
      const t = map[y][x];
      const rd = resData[y] ? resData[y][x] : null;
      const px = x*TILE, py = y*TILE;
      if (t === T_TREE && rd) {
        // 树干
        ctx.fillStyle = '#4a3a1a';
        ctx.fillRect(px+TILE/2-3, py+TILE-12, 6, 12);
        // 树冠
        const sway = Math.sin(performance.now()/800 + x + y) * 1.5;
        ctx.fillStyle = '#2a4a1a';
        ctx.beginPath();
        ctx.arc(px+TILE/2+sway, py+TILE-18, 13, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#3a5a2a';
        ctx.beginPath();
        ctx.arc(px+TILE/2-4+sway, py+TILE-20, 8, 0, Math.PI*2);
        ctx.fill();
        // 受损显示
        if (rd.hp < 3) {
          ctx.fillStyle = 'rgba(255,200,100,.3)';
          ctx.beginPath();
          ctx.arc(px+TILE/2, py+TILE-18, 13, 0, Math.PI*2);
          ctx.fill();
        }
      }
      if (t === T_ROCK && rd) {
        ctx.fillStyle = '#5a5a5e';
        ctx.beginPath();
        ctx.moveTo(px+6, py+TILE-6);
        ctx.lineTo(px+TILE/2-2, py+6);
        ctx.lineTo(px+TILE-6, py+TILE-6);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#6a6a6e';
        ctx.beginPath();
        ctx.moveTo(px+10, py+TILE-8);
        ctx.lineTo(px+TILE/2, py+10);
        ctx.lineTo(px+TILE-10, py+TILE-8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#4a4a4e';
        ctx.fillRect(px+TILE/2-3, py+TILE-10, 6, 4);
      }
      if (t === T_BUSH && rd) {
        ctx.fillStyle = '#2a4a2a';
        ctx.beginPath();
        ctx.arc(px+TILE/2, py+TILE/2+4, 11, 0, Math.PI*2);
        ctx.fill();
        // 浆果
        for (let i=0; i<rd.berries; i++) {
          ctx.fillStyle = '#c44';
          ctx.beginPath();
          ctx.arc(px+TILE/2+Math.cos(i*2)*6, py+TILE/2+4+Math.sin(i*2)*6, 2.5, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
  }

  // ── 实体 ──
  for (const e of entities) {
    if (e.type === 'campfire') {
      // 石圈
      ctx.fillStyle = '#4a4a4e';
      for (let i=0; i<6; i++) {
        const a = i/6*Math.PI*2;
        ctx.beginPath();
        ctx.arc(e.x+Math.cos(a)*12, e.y+Math.sin(a)*12, 4, 0, Math.PI*2);
        ctx.fill();
      }
      // 火焰
      const fl = 1 + Math.sin(e.flicker)*0.2 + Math.random()*0.1;
      ctx.fillStyle = '#c44';
      ctx.beginPath();
      ctx.arc(e.x, e.y, 8*fl, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#e84';
      ctx.beginPath();
      ctx.arc(e.x, e.y-2, 5*fl, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fc8';
      ctx.beginPath();
      ctx.arc(e.x, e.y-3, 2.5*fl, 0, Math.PI*2);
      ctx.fill();
      // 光晕
      const grad = ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.radius);
      grad.addColorStop(0, 'rgba(255,160,60,.15)');
      grad.addColorStop(0.5, 'rgba(255,120,40,.05)');
      grad.addColorStop(1, 'rgba(255,100,30,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
      ctx.fill();
    }
    if (e.type === 'shadow') {
      e.flicker += 0.1;
      const fl = 1 + Math.sin(e.flicker)*0.1;
      // 影体
      ctx.fillStyle = e.burning > 0 ? `rgba(120,40,120,${0.6+e.burning})` : 'rgba(20,10,30,.85)';
      ctx.beginPath();
      ctx.ellipse(e.x, e.y+8, 10*fl, 6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.x, e.y-2, 10*fl, 0, Math.PI*2);
      ctx.fill();
      // 眼睛
      ctx.fillStyle = e.burning > 0 ? '#fa4' : '#f44';
      ctx.beginPath();
      ctx.arc(e.x-3, e.y-3, 1.5, 0, Math.PI*2);
      ctx.arc(e.x+3, e.y-3, 1.5, 0, Math.PI*2);
      ctx.fill();
      // 烟雾
      if (Math.random()<0.3) {
        particles.push({ x:e.x, y:e.y-5, vx:0, vy:-0.5,
          life:0.6, maxLife:0.6, color:'rgba(40,20,50,.3)', size:4, type:'smoke' });
      }
    }
  }

  // ── 玩家 ──
  if (!player) { ctx.restore(); return; }
  const bob = Math.sin(player.animT) * 2;
  // 影子
  ctx.fillStyle = 'rgba(0,0,0,.3)';
  ctx.beginPath();
  ctx.ellipse(player.x, player.y+10, 8, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // 身体
  ctx.fillStyle = '#C4B8A4';
  ctx.beginPath();
  ctx.arc(player.x, player.y+bob, 7, 0, Math.PI*2);
  ctx.fill();
  // 头
  ctx.fillStyle = '#E8D5B0';
  ctx.beginPath();
  ctx.arc(player.x, player.y-4+bob, 5, 0, Math.PI*2);
  ctx.fill();
  // 朝向指示
  ctx.strokeStyle = '#8a7d6a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y+bob);
  ctx.lineTo(player.x + Math.cos(player.facing)*12, player.y+bob + Math.sin(player.facing)*12);
  ctx.stroke();
  // 火把光晕
  if (torchTimer > 0) {
    const fl = 1 + Math.sin(performance.now()/100)*0.15;
    const grad = ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,80*fl);
    grad.addColorStop(0, 'rgba(255,160,60,.12)');
    grad.addColorStop(1, 'rgba(255,100,30,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 80*fl, 0, Math.PI*2);
    ctx.fill();
  }

  // ── 放置预览 ──
  if (placeMode === 'campfire') {
    const wx = mouse.x + cam.x - w/2;
    const wy = mouse.y + cam.y - h/2;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#e84';
    ctx.beginPath();
    ctx.arc(wx, wy, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── 粒子 ──
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    if (p.type === 'slash') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 20*(1-a)+5, 0, Math.PI*2);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ── 全局光照覆盖 ──
  renderLighting(w, h);

  // ── 受伤红屏 ──
  if (damageFlash > 0) {
    ctx.fillStyle = `rgba(180,40,40,${damageFlash*0.4})`;
    ctx.fillRect(0, 0, w, h);
  }
}

function renderLighting(w, h) {
  // 计算白天/黄昏/黑夜的覆盖
  let darkness = 0;
  if (phase === 'day') darkness = 0;
  else if (phase === 'dusk') {
    const t = (timeOfDay - DAY_LEN) / DUSK_LEN;
    darkness = t * 0.75;
  } else {
    darkness = 0.82;
  }

  if (darkness <= 0) return;

  // 创建黑暗遮罩, 然后在光源处打孔
  ctx.save();
  ctx.fillStyle = `rgba(2,4,12,${darkness})`;
  ctx.fillRect(0, 0, w, h);

  // 用 destination-out 在光源处擦除黑暗
  ctx.globalCompositeOperation = 'destination-out';
  const cx = w/2, cy = h/2;

  // 篝火
  for (const e of entities) {
    if (e.type !== 'campfire') continue;
    const sx = e.x - cam.x + cx;
    const sy = e.y - cam.y + cy;
    const r = e.radius + Math.sin(e.flicker||0)*5;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.4, 'rgba(255,255,255,0.7)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fill();
  }

  // 火把
  if (torchTimer > 0) {
    const sx = player.x - cam.x + cx;
    const sy = player.y - cam.y + cy;
    const r = 80 + Math.sin(performance.now()/100)*5;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.4)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fill();
  }

  // 玩家周围微弱视野 (即使没火也能看到一点点)
  const psx = player.x - cam.x + cx;
  const psy = player.y - cam.y + cy;
  const pgrad = ctx.createRadialGradient(psx, psy, 0, psx, psy, 50);
  pgrad.addColorStop(0, 'rgba(255,255,255,0.5)');
  pgrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = pgrad;
  ctx.beginPath();
  ctx.arc(psx, psy, 50, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  HUD 更新
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  if (!player) return;
  // 血量
  document.getElementById('hp-fill').style.width = player.hp + '%';
  document.getElementById('hp-val').textContent = Math.round(player.hp);
  document.getElementById('hp-fill').style.background = player.hp < 30 ? '#a22' : '#c44';
  // 饥饿
  document.getElementById('hunger-fill').style.width = player.hunger + '%';
  document.getElementById('hunger-val').textContent = Math.round(player.hunger);
  // 理智
  document.getElementById('sanity-fill').style.width = player.sanity + '%';
  document.getElementById('sanity-val').textContent = Math.round(player.sanity);
  document.getElementById('sanity-fill').style.background = player.sanity < 30 ? '#624' : '#84c';

  // 天数/时间
  document.getElementById('day-num').textContent = `第 ${dayCount} 天`;
  const labels = { day:'白天 ☀', dusk:'黄昏 🌅', night:'黑夜 🌙' };
  document.getElementById('time-label').textContent = labels[phase];

  // 背包
  updateInv('wood', player.inv.wood);
  updateInv('stone', player.inv.stone);
  updateInv('berry', player.inv.berry);
  updateInv('torch', player.inv.torch);
}

function updateInv(id, count) {
  const el = document.getElementById('inv-' + id);
  el.classList.toggle('has', count > 0);
  el.querySelector('.inv-count').textContent = count > 0 ? count : '';
}

// ═══════════════════════════════════════════════════════════
//  Toast & Overlay
// ═══════════════════════════════════════════════════════════
let toastTimer = null;
function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

function showDeath() {
  const ov = document.getElementById('overlay');
  document.getElementById('ov-title').textContent = '你 倒 下 了';
  document.getElementById('ov-sub').textContent = '黑夜吞噬了你...';
  document.getElementById('ov-stats').style.display = 'flex';
  document.getElementById('ov-days').textContent = dayCount;
  document.getElementById('ov-kills').textContent = kills;
  document.getElementById('ov-btn').textContent = '重新开始';
  ov.classList.remove('hide');
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hide');
}

document.getElementById('ov-btn').addEventListener('click', () => {
  initAudio();
  newGame();
});

// ═══════════════════════════════════════════════════════════
//  尺寸 & 主循环
// ═══════════════════════════════════════════════════════════
function resize() {
  DPR = Math.min(window.devicePixelRatio||1, 2);
  const rect = canvas.getBoundingClientRect();
  VW = rect.width; VH = rect.height;
  canvas.width = Math.round(VW * DPR);
  canvas.height = Math.round(VH * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (gameRunning) update(dt);
  render();
  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);

// 调试接口 (开发用)
window.__game = { update, render, resize, newGame,
  get mapData() { return { map, resData }; },
  get state() { return { gameRunning, player, cam, phase, dayCount, entities: entities.length }; } };

})();
</script>
